<!-- Source: https://wazuh.com/blog/monitoring-snowflake-data-warehouse-with-wazuh/ | Article: Monitoring Snowflake data warehouse with Wazuh -->
<ossec_config>
  <wodle name="command">
    <disabled>no</disabled>
    <command>python3 /etc/snowflake_logs/snow_log_collector.py</command>
    <interval>5m</interval>
    <ignore_output>yes</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>180</timeout>
  </wodle>

  <localfile>
    <log_format>json</log_format>
    <location>/etc/snowflake_logs/logs/*.json</location>
  </localfile>
</ossec_config>