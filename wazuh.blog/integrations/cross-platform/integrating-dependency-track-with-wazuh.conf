<!-- Source: https://wazuh.com/blog/integrating-dependency-track-with-wazuh/ | Article: Integrating Dependency-Track with  Wazuh -->
<ossec_config>
<!-- Dependency-Track monitor script -->
  <wodle name="command">
    <disabled>no</disabled>
    <tag>dependency-track</tag>
    <command>/var/ossec/custom-script/dependency_track_monitor.sh</command>
    <interval>1d</interval> <!-- Run every day-->
    <ignore_output>no</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>0</timeout>
  </wodle>
</ossec_config>