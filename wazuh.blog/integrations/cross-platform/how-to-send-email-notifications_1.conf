<!-- Source: https://wazuh.com/blog/how-to-send-email-notifications/ | Article: How to Send Email Notifications -->
<ossec_config>
  <global>

    <email_notification>yes</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuhtest@testserver.com</email_from>
    <email_to>wazuhtest@testserver.com</email_to>
    <email_maxperhour>60</email_maxperhour>
  </global>

  <alerts>
    <email_alert_level>12</email_alert_level>
  </alerts>

</ossec_config>