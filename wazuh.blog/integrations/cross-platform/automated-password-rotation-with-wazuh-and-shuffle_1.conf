<!-- Source: https://wazuh.com/blog/automated-password-rotation-with-wazuh-and-shuffle/ | Article: Automated password rotation with Wazuh and Shuffle -->
<ossec_config>
  <integration>
    <name>shuffle</name>
    <hook_url><YOUR_SHUFFLE_URL></hook_url>
    <rule_id>100500,100501</rule_id>
    <level>3</level>
    <alert_format>json</alert_format>
  </integration>
</ossec_config>