<!-- Source: https://wazuh.com/blog/integrating-sentinelone/ | Article: Integrating SentinelOne XDR with Wazuh -->
<wodle name="command">
  <disabled>no</disabled>
  <command>/var/ossec/framework/python/bin/python3 /var/ossec/integrations/sentinel_one.py</command>
  <interval>1m</interval>
  <ignore_output>yes</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>0</timeout>
</wodle>

<localfile>
  <log_format>json</log_format>
  <location>/var/log/sentinelone.json</location>
</localfile>