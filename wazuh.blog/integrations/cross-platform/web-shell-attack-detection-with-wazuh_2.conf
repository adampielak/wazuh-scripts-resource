<!-- Source: https://wazuh.com/blog/web-shell-attack-detection/ | Article: Web shell attack detection with Wazuh -->
<ossec_config>
  <localfile>
    <log_format>full_command</log_format>
    <command>ss -nputw | egrep 'ESTAB && "sh"|"bash"|"csh"|"ksh"|"zsh"' | awk '{ print $5 "|" $6 }'</command>
    <alias>webshell connections</alias>
    <frequency>120</frequency>
  </localfile>
</ossec_config>