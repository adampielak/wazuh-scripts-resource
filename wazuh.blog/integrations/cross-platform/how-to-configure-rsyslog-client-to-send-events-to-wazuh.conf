<!-- Source: https://wazuh.com/blog/how-to-configure-rsyslog-client-to-send-events-to-wazuh/ | Article: How to configure Rsyslog client to send events to Wazuh -->
<ossec_config>
  <remote>
    <connection>syslog</connection>
    <port><PORT></port>
    <protocol><PROTOCOL></protocol>
    <allowed-ips><CIDR_NOTATION></allowed-ips>
    <local_ip><WAZUH_MANAGER_IP></local_ip>
  </remote>
</ossec_config>