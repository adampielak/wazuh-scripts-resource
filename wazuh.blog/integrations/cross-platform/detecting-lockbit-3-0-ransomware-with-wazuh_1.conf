<!-- Source: https://wazuh.com/blog/detecting-lockbit-3/ | Article: Detecting Lockbit 3.0 ransomware with Wazuh -->
<ossec_config>
    <command>
        <name>yara</name>
        <executable>yara.bat</executable>
        <timeout_allowed>no</timeout_allowed>
    </command>

    <active-response>
        <command>yara</command>
        <location>local</location>
        <rules_id>100050,100051</rules_id>
    </active-response>
</ossec_config>