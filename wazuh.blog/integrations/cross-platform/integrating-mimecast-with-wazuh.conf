<!-- Source: https://wazuh.com/blog/integrating-mimecast/ | Article: Integrating Mimecast with Wazuh -->
<wodle name="command">
  <disabled>no</disabled>
  <command>/var/ossec/framework/python/bin/python3 /var/ossec/integrations/mimecast.py</command>
  <interval>5m</interval>
  <ignore_output>yes</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>120</timeout>
</wodle>

<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/mimecast/log/mimecast.log</location>
</localfile>