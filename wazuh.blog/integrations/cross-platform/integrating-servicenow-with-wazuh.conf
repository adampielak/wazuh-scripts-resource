<!-- Source: https://wazuh.com/blog/integrating-servicenow-with-wazuh/ | Article: Integrating ServiceNow with Wazuh -->
<ossec_config>
  <!-- ServiceNow -->
  <integration>
    <name>custom-servicenow</name>
    <hook_url>https://<SN_INSTANCE>.service-now.com/api/now/table/incident</hook_url>
    <level>12</level> <!-- send only level 12+ alerts —->
    <alert_format>json</alert_format>
  </integration>
</ossec_config>