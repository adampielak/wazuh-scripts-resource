<!-- Source: https://wazuh.com/blog/rapperbot-botnet/ | Article: RapperBot botnet detection and mitigation with Wazuh -->
<localfile>
    <log_format>full_command</log_format>
    <command>ss -nputw | grep -c ':22 ' | awk -F: '$0 > 4'</command>
    <alias>ss listening SSH outbounds</alias>
    <frequency>90</frequency>
</localfile>

<localfile>
    <log_format>full_command</log_format>
    <command>ss -nputw | egrep '2.58.149.116:9999|185.225.73.196:443'</command>
    <alias>ss listening C2 server port</alias>
    <frequency>90</frequency>
</localfile>

<localfile>
    <log_format>full_command</log_format>
    <command>cat /etc/passwd | grep 'suhelper'</command>
    <alias>check root user creation</alias>
    <frequency>90</frequency>
</localfile>

<localfile>
    <log_format>full_command</log_format>
    <command>cat /etc/cron.hourly/0 | grep 'suhelper'</command>
    <alias>check cron job for root user creation</alias>
    <frequency>90</frequency>
</localfile>