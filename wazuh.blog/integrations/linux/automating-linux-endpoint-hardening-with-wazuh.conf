<!-- Source: https://wazuh.com/blog/automating-linux-endpoint-hardening-with-wazuh/ | Article: Automating Linux endpoint hardening with Wazuh -->
<ossec_config>
  <wodle name="command">
    <disabled>no</disabled>
    <tag>hardening-script</tag>
    <command>/var/ossec/active-response/bin/linux_hardening.sh</command>
    <interval>7d</interval>
    <ignore_output>yes</ignore_output>
    <run_on_start>yes</run_on_start>
    <verify_sha256><SHA_256_HASH></verify_sha256>
    <timeout>300</timeout>
  </wodle>
</ossec_config>