<!-- Source: https://wazuh.com/blog/security-observability-on-linux-with-wazuh-and-tetragon/ | Article: Security observability on Linux with Wazuh and Tetragon -->
<ossec_config>
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/tetragon/tetragon.log</location>
    <out_format>$(timestamp) $(hostname) tetragon-events: $(log)</out_format>
  </localfile>
</ossec_config>