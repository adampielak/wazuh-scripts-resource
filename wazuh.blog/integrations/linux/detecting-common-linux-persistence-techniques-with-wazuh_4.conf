<!-- Source: https://wazuh.com/blog/detecting-common-linux-persistence/ | Article: Detecting common Linux persistence techniques with Wazuh -->
<ossec_config>
  <!-- Command monitoring (command executes every 180 seconds) -->
  <localfile>
    <log_format>command</log_format>
    <command>printenv LD_PRELOAD</command>
    <alias>check for LD_PRELOAD envar</alias>
    <frequency>180</frequency>
  </localfile>
</ossec_config>