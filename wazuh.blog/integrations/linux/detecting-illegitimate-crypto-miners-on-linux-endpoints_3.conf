<!-- Source: https://wazuh.com/blog/detecting-illegitimate-crypto-miners/ | Article: Detecting illegitimate crypto miners on Linux endpoints -->
<agent_config os="linux">
  <localfile>
    <log_format>full_command</log_format>
    <command>top -bn1 | grep "Cpu(s)" | sed "s/.*, *\([0-9.]*\)%* id.*/\1/" | awk '{print 100 - $1"%"}'</command>
    <alias>top cpu usage</alias>
    <frequency>60</frequency>
  </localfile>
</agent_config>