<!-- Source: https://wazuh.com/blog/monitoring-hyper-v-with-wazuh/ | Article: Monitoring Hyper-V with Wazuh -->
<ossec_config>
  <wodle name="command">
	<disabled>no</disabled>
	<tag>hyper-v_metrics</tag>
	<command>PowerShell.exe -ExecutionPolicy Bypass -File "C:\Program Files (x86)\ossec-agent\wodles\hyper-v_metrics.ps1"</command>
	<interval>1m</interval>
	<ignore_output>no</ignore_output>
	<run_on_start>yes</run_on_start>
	<timeout>0</timeout>
  </wodle>
</ossec_config>