<!-- Source: https://wazuh.com/blog/automating-windows-endpoint-hardening-with-wazuh/ | Article: Automating Windows endpoint hardening with Wazuh -->
<wodle name="command">
    <disabled>no</disabled>
    <command>powershell.exe C:\windows_hardening.bat</command>
    <interval>7d</interval>
    <ignore_output>yes</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>0</timeout>
  </wodle>