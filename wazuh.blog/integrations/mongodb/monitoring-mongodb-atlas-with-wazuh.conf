<!-- Source: https://wazuh.com/blog/monitoring-mongodb-atlas-with-wazuh/ | Article: Monitoring MongoDB Atlas with Wazuh -->
<ossec_config>
  <wodle name="command">
    <disabled>no</disabled>
    <command>python3 /etc/mongodb_atlas/mongo_atlas.py</command>
    <interval>5m</interval>
    <ignore_output>yes</ignore_output>
    <run_on_start>yes</run_on_start>
    <timeout>180</timeout>
  </wodle>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/mongodb_atlas/atlas_events.json</location>
  </localfile>
</ossec_config>