<!-- Source: https://wazuh.com/blog/scanning-docker-infrastructure-against-cis-benchmark/ | Article: Scanning Docker infrastructure against CIS Benchmark with Wazuh -->
<ossec_config>
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>24h</interval>
    <skip_nfs>yes</skip_nfs>
    <policies> 
      <policy>/var/ossec/etc/sca_docker_audit.yml</policy>  
    </policies>
  </sca>
</ossec_config>